<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

<fieldset>
    <legend>Registration Form</legend>

    <form><center>
        <table >

            
            <tr>
                <td colspan="2"><b>NAME:*</b></td>
            </tr>
            <tr>
                <td><input type="text" name="fname" placeholder="First Name" required></td>
                <td><input type="text" name="lname" placeholder="Last Name" required></td>
            </tr>

            
            <tr>
                <td colspan="2"><b>Phone Number:*</b></td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="text" name="ph" placeholder="Ex-1234556789" required>
                </td>
            </tr>

            
            <tr>
                <td colspan="2"><b>Email:*</b></td>
            </tr>
            <tr>
                <td colspan="1">
                    <input type="email" name="email" placeholder="Enter mailid" required>
                </td>
            </tr>

            
           
            <tr>
                <td colspan="1"><b>Check  Date:*</b></td>
                <td colspan="1"><b>Check Out Date:*</b></td>
            </tr>
            <tr>
                <td>
                    <input type="date" name="checkin">
                </td>
                <td>
                    <input type="date" name="checkout">
                </td>
            </tr>

            
            <tr>
                <td colspan="2"><b>Special Requirements</b></td>
            </tr>
            <tr>
                <td colspan="1">
                    <textarea name="special" rows="1" cols="10"></textarea>
                </td>
            </tr>

            
            <tr>
                <td colspan="2" >
                    <input type="submit" value="Submit">
                </td>
            </tr>

        </table>
        </center>

    </form>

</fieldset>

</body>
</html>
