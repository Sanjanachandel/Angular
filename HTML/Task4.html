<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pizza Mania</title>
</head>
<body>

<h2 style="background: yellow; text-align: center;">Pizza Mania </h2>

<fieldset>
    <legend><h2> Pizza Order Here </h2></legend>

    <form>
        <table cellpadding="10">

            
            <tr>
                <td>First Name:</td>
                <td><input type="text" placeholder="First Name"></td>
            </tr>

            <tr>
                <td>Last Name:</td>
                <td><input type="text" placeholder="Last Name"></td>
            </tr>
            
            <tr>
                <td>Email:</td>
                <td><input type="email" placeholder="abc@example.com"></td>
            </tr>

            <tr>
                <td>Contact:</td>
                <td><input type="text" placeholder="Ex-9898989898"></td>
            </tr>

            <tr>
                <td>Preferred Delivery Date:</td>
                <td><input type="date"></td>
            </tr>

            
            <tr>
                <td>Size:

                    <input type="radio" name="size"> Small
                    <input type="radio" name="size"> Medium
                    <input type="radio" name="size"> Large
                
                </td>
            </tr>

            
           

        </table>
    </form>

</fieldset>

</body>
</html>
