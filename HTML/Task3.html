<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applicant Details</title>
</head>

<body>
    <fieldset>
        <legend>Applicant Details</legend>
        <form>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" required />
            <br /><br />
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required />
            <br /><br />
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required />
            <br /><br />
            <label for="gender">Gender:</label>
            <br /><br />
            Male<input type="radio" name="gender" value="male" required />
            Female<input type="radio" name="gender" value="female" required />
            <br /><br />
            <label for="contact">Contact:</label>
            <input type="tel" name="contact" id="contact" required />
            <br /><br />
            <label for="qr">Qualification:</label>
            <input type="file" name="qr" id="qr" required />
            <br /><br />
            <label for="join">Joining Date:</label>
            <input type="date" name="join" id="join" required />
            <br /><br />
            <label for="check">Skills</label>
            <input type="checkbox" />
            <label for="check">javascriptL</label>
            <input type="checkbox" />
            <label for="check">Angular</label>
            <br /><br />
            <input type="checkbox" name="" id="" />
            <label for="check">React</label>
            <input type="checkbox" name="" id="" />
            <label for="check">Express</label>
            <br /><br />
            <input type="checkbox" name="" id="" />
            <label for="check">Python</label>
            <input type="checkbox" name="" id="" />
            <label for="check">SQL</label>
            <br /><br />
            <label for="exp">Year of experience:</label>
            <input type="range" />
            <br /><br />
            <label for="Work">Work Location:</label>
            <select name="wrok" id="work">
                <option value="--default"></option>
                <optgroup label="South India">
                    <option value="chennai">Chennai</option>
                    <option value="bangalore">Bangalore</option>
                </optgroup>
                <optgroup label="Other Cities">
                    <option value="hyderabad">Hyderabad</option>
                    <option value="pune">Pune</option>
                </optgroup>
            </select>
            <br /><br />
            <label for="add">Address:</label>
            <textarea name="add" id="add" rows="2" cols="20" required></textarea>
            <br /><br />
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
        </form>
    </fieldset>
</body>

</html>
