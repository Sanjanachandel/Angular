<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ingredients for Biryani</h1>
    <ul class="box" type="disc">
        <li class="box">Rice</li>
        <li class="box">Chicken
            <ul type="circle">
                <li>Fried</li>
                <li>Grilled</li>
                <li>Roasted</li>
            </ul>
        </li>
        <li id="p">Paneer</li>
    </ul>
    <h1 >Fighter Jet</h1>
    <ul id ="id" type="disc">
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>
    <h1 >Ingredients for lassi</h1>
    <ul class="i">
        <li class="i">Curd</li>
        <li class="i">Water</li>
        <li class="i">Sugar
            <ul  class="bb" type="circle">
                <li class="bb">white sugar</li>
                <li class="bb">Brown sugar</li>
            </ul>
        </li>
        <li class="i">Malai</li>
        <li class="i">Kova</li>
    </ul>

</body>
</html>
