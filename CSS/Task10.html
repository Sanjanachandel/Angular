<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frontend Quiz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: #2c3a4b;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}


.container {
  width: 90%;
  max-width: 1100px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}


.left {
  flex: 1;
}

.left h1 {
  font-size: 40px;
  font-weight: 300;
}

.left h1 span {
  font-weight: bold;
}

.left p {
  margin-top: 15px;
  color: #b0bec5;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}


.toggle {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
}

.switch {
  width: 50px;
  height: 25px;
  background: #7c3aed;
  border-radius: 20px;
  position: relative;
}

.circle {
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2.5px;
  right: 3px;
}


.card {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 18px;
  background: #3b4b5c;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #4a5d73;
}

.icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}


.html { background: #fcd9c6; color: #e44d26; }
.css { background: #d4f5e9; color: #264de4; }
.js { background: #e6e6fa; color: #f7df1e; }
.acc { background: #f3d9ff; color: #a855f7; }

.card h3 {
  font-weight: 500;
}
</style>

</head>
<body>

<div class="container">

  
  <div class="left">
    <h1>Welcome to the <br> <span>Frontend Quiz!</span></h1>
    <p>Pick a subject to get started.</p>
  </div>

  
  <div class="right">

    
    <div class="toggle">
      🌞
      <div class="switch">
        <div class="circle"></div>
      </div>
      🌙
    </div>

    
    <div class="card">
      <div class="icon html">&lt;/&gt;</div>
      <h3>HTML</h3>
    </div>

    <div class="card">
      <div class="icon css">🎨</div>
      <h3>CSS</h3>
    </div>

    <div class="card">
      <div class="icon js">JS</div>
      <h3>Javascript</h3>
    </div>

    <div class="card">
      <div class="icon acc">♿</div>
      <h3>Accessibility</h3>
    </div>

  </div>

</div>

</body>
</html>
